name: Daily Walpurgis Update

on:
  schedule:
    - cron: "0 11 * * *"  # 6 AM Florida time (11 AM UTC)
  workflow_dispatch:  # manual trigger option

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node sendUpdate.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
