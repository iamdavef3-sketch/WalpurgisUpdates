name: Daily Walpurgis Update

on:
  schedule:
    # Runs at 11:00 UTC (6 AM EST) and 22:00 UTC (5 PM EST)
    - cron: "0 11,22 * * *"
  workflow_dispatch:  # Allows you to click "Run Now" manually for testing

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node sendUpdate.js
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
